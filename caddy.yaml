services:
  caddy:
    image: caddy:latest
    container_name: 68_s1_cybersecGroup_webproxy
    restart: unless-stopped
    ports:
      - ${Caddy_Port}:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./localhost+1.pem:/certs/localhost+1.pem
      - ./localhost+1-key.pem:/certs/localhost+1-key.pem
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - s1_network

volumes:
  caddy_data:
  caddy_config:
